<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV Monitor | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dashboard: {
                            dark: '#0f172a',
                            card: 'rgba(30, 41, 59, 0.7)',
                            teal: '#308B9B',
                            accent: '#F9A826',
                            green: '#10b981',
                            red: '#E55353',
                            textMuted: '#94a3b8',
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.cdnfonts.com/css/lcd');
        
        body { background-color: #020617; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .circle-progress { transform: rotate(-90deg); transform-origin: 50% 50%; }
        .progress-ring__circle { transition: stroke-dashoffset 1s ease-in-out; }
        
        /* The LCD Font - applied ONLY to digits */
        .lcd-text { 
            font-family: 'LCD', 'LCD ITC', monospace !important; 
            letter-spacing: 2px;
            display: inline-block;
        }

        .unit-text {
            font-family: 'Inter', sans-serif !important;
            font-weight: 400;
            font-size: 0.5em;
            margin-left: 4px;
            color: #94a3b8;
            vertical-align: middle;
        }

        @keyframes pulse-glow-green { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.2); } 50% { box-shadow: 0 0 20px 2px rgba(16, 185, 129, 0.1); } }
        @keyframes pulse-glow-orange { 0%, 100% { box-shadow: 0 0 0 0 rgba(249, 168, 38, 0.2); } 50% { box-shadow: 0 0 20px 2px rgba(249, 168, 38, 0.1); } }
        .charge-glow { animation: pulse-glow-green 2s infinite; border-color: rgba(16, 185, 129, 0.5) !important; }
        .discharge-glow { animation: pulse-glow-orange 2s infinite; border-color: rgba(249, 168, 38, 0.5) !important; }
    </style>
</head>
<body class="text-slate-200 p-4 lg:p-8">
    <div id="error-toast" class="fixed top-6 right-6 bg-red-500 text-white px-6 py-3 rounded-lg shadow-2xl hidden z-50"></div>

    <main class="max-w-[1400px] mx-auto space-y-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 pb-4 border-b border-slate-800">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-gradient-to-tr from-teal-500 to-blue-600 rounded-lg flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-bolt-lightning text-white text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-white">PV <span class="text-teal-400 font-light text-xl">Monitor</span></h1>
            </div>
            <div class="flex items-center gap-6">
                <!-- Weather Widget -->
                <div id="weather-widget" class="hidden items-center gap-3 bg-slate-900/50 px-4 py-2 rounded-full border border-slate-700">
                    <img id="weather-icon" src="" alt="weather" class="w-8 h-8">
                    <div class="flex flex-col">
                        <span id="weather-temp" class="text-sm font-bold text-white leading-none">--°C</span>
                        <span id="weather-desc" class="text-[9px] text-slate-400 uppercase tracking-tighter leading-none mt-1">--</span>
                    </div>
                </div>
                <div class="flex items-center gap-2 bg-slate-900/50 px-4 py-2 rounded-full border border-slate-700">
                    <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-green-500 shadow-[0_0_10px_#10b981]"></div>
                    <span id="status-text" class="text-sm font-medium text-slate-300">Live</span>
                </div>
                <div class="text-slate-500 text-sm" id="header-sync">--:--:--</div>
            </div>
        </header>

        <!-- Top Row -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Battery -->
            <div class="bg-dashboard-card glass rounded-2xl p-8 border border-slate-700/50 flex flex-col items-center" id="card-battery">
                <h3 class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-6">Bateria</h3>
                <div class="relative w-40 h-40 mb-4">
                    <svg class="w-full h-full circle-progress" viewBox="0 0 100 100">
                        <circle class="text-slate-800 stroke-current" stroke-width="6" cx="50" cy="50" r="42" fill="transparent"></circle>
                        <circle class="text-dashboard-green stroke-current progress-ring__circle" stroke-width="7" stroke-linecap="round" cx="50" cy="50" r="42" fill="transparent" stroke-dasharray="263.9" stroke-dashoffset="263.9" id="circle-bat"></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div>
                            <span id="val-bat-pct" class="text-5xl font-bold text-white lcd-text">0</span>
                            <span class="unit-text">%</span>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span id="bat-icon" class="text-teal-400 text-xl">🔋</span>
                    <span id="val-bat-w" class="text-2xl font-semibold text-white lcd-text">0</span>
                    <span class="unit-text" style="font-size: 0.8rem;">W</span>
                </div>
                <div id="bat-state-desc" class="text-[10px] text-slate-500 mt-2 italic uppercase">Pobieranie...</div>
            </div>

            <!-- Inverter/Load -->
            <div class="bg-dashboard-card glass rounded-2xl p-8 border border-slate-700/50 flex flex-col items-center">
                <h3 class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-6">Obciążenie</h3>
                <div class="relative w-40 h-40 mb-4">
                    <svg class="w-full h-full circle-progress" viewBox="0 0 100 100">
                        <circle class="text-slate-800 stroke-current" stroke-width="6" cx="50" cy="50" r="42" fill="transparent"></circle>
                        <circle class="text-blue-500 stroke-current progress-ring__circle" stroke-width="7" stroke-linecap="round" cx="50" cy="50" r="42" fill="transparent" stroke-dasharray="263.9" stroke-dashoffset="180" id="circle-load"></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div>
                            <span id="val-load-w" class="text-4xl font-bold text-white lcd-text">0</span>
                            <span class="unit-text">W</span>
                        </div>
                    </div>
                </div>
                <div class="text-xl font-semibold text-white">
                    <span id="val-load-pct" class="lcd-text">0</span><span class="unit-text">%</span>
                </div>
            </div>

            <!-- Solar -->
            <div class="bg-dashboard-card glass rounded-2xl p-8 border border-slate-700/50 flex flex-col items-center">
                <h3 class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-6">Słońce</h3>
                <div class="relative w-40 h-40 mb-4">
                    <svg class="w-full h-full circle-progress" viewBox="0 0 100 100">
                        <circle class="text-slate-800 stroke-current" stroke-width="6" cx="50" cy="50" r="42" fill="transparent"></circle>
                        <circle class="text-dashboard-accent stroke-current progress-ring__circle" stroke-width="7" stroke-linecap="round" cx="50" cy="50" r="42" fill="transparent" stroke-dasharray="263.9" stroke-dashoffset="263.9" id="circle-pv"></circle>
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <div>
                            <span id="val-pv-w" class="text-4xl font-bold text-white lcd-text">0</span>
                            <span class="unit-text">W</span>
                        </div>
                    </div>
                </div>
                <div class="text-xl font-semibold text-white">
                    <span id="val-pv-v" class="lcd-text">0</span><span class="unit-text">V</span>
                </div>
            </div>
        </div>

        <!-- Charts & Net -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 bg-dashboard-card glass rounded-2xl p-6 border border-slate-700/50">
                <div id="energy-chart" class="w-full h-[300px]"></div>
            </div>

            <div class="flex flex-col gap-6">
                <div class="bg-gradient-to-br from-slate-800 to-dashboard-dark p-6 rounded-2xl border border-slate-700">
                    <h4 class="text-slate-500 text-[9px] uppercase font-bold mb-4">Bilans Netto</h4>
                    <div class="mb-2">
                        <span id="val-net-w" class="text-4xl font-bold lcd-text">0</span>
                        <span class="unit-text" style="font-size: 1rem;">W</span>
                    </div>
                    <div id="sub-net-text" class="text-[10px] text-slate-400 mb-4 uppercase">...</div>
                    <div class="w-full h-1.5 bg-slate-900 rounded-full overflow-hidden">
                        <div id="net-progress-fill" class="h-full bg-teal-500 transition-all duration-1000" style="width: 50%"></div>
                    </div>
                </div>

                <div class="bg-dashboard-card glass p-6 rounded-2xl border border-slate-700/50">
                    <h4 class="text-slate-500 text-[9px] uppercase font-bold mb-2">Sieć AC</h4>
                    <div class="mb-1">
                        <span id="val-grid-w" class="text-2xl font-bold text-white lcd-text">0</span>
                        <span class="unit-text">W</span>
                    </div>
                    <div class="text-slate-400">
                        <span id="val-grid-v" class="text-sm font-medium lcd-text">0</span><span class="unit-text">V</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Details & Settings -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-dashboard-card glass rounded-2xl border border-slate-700/50 overflow-hidden">
                <div class="bg-slate-800/50 px-6 py-3 border-b border-slate-700 text-xs font-bold uppercase tracking-wider">Napięcia Systemowe</div>
                <div class="p-4 space-y-4">
                    <div class="flex justify-between items-center"><span class="text-xs text-slate-400 uppercase">Bateria</span><div class="text-white font-bold"><span id="v-bat-detail" class="text-lg lcd-text">0.0</span><span class="unit-text">V</span></div></div>
                    <div class="flex justify-between items-center"><span class="text-xs text-slate-400 uppercase">Sieć Wejście</span><div class="text-white font-bold"><span id="v-grid-detail" class="text-lg lcd-text">0.0</span><span class="unit-text">V</span></div></div>
                    <div class="flex justify-between items-center"><span class="text-xs text-slate-400 uppercase">Dom Wyjście</span><div class="text-white font-bold"><span id="v-load-detail" class="text-lg lcd-text">0.0</span><span class="unit-text">V</span></div></div>
                </div>
            </div>

            <div class="bg-dashboard-card glass rounded-2xl border border-slate-700/50 overflow-hidden">
                <div class="bg-slate-800/50 px-6 py-3 border-b border-slate-700 flex justify-between items-center text-xs font-bold uppercase tracking-wider">
                    <span>Ustawienia</span>
                    <button onclick="fetchSettings(true)" class="bg-teal-600 px-2 py-1 rounded text-[9px]">Odśwież</button>
                </div>
                <div class="p-4 space-y-3">
                    <div id="settings-loading" class="text-center py-4 text-slate-500 text-xs uppercase">Wczytywanie...</div>
                    <div id="settings-list" class="space-y-2 hidden">
                        <div class="flex justify-between items-center bg-slate-900/40 p-3 rounded-lg border border-slate-800"><span class="text-xs text-slate-300">Priorytet wyjścia</span><div class="flex gap-2"><select id="set-output-priority" class="bg-slate-800 text-[10px] text-white border-slate-700 rounded px-1"><option value="0">Utility</option><option value="1">Solar</option><option value="2">SBU</option></select><button onclick="updateWithRetry(['los_output_source_priority','bse_output_source_priority'], 'set-output-priority')" class="bg-blue-600 text-[9px] px-2 py-1 rounded font-bold uppercase">Ustaw</button></div></div>
                        <div class="flex justify-between items-center bg-slate-900/40 p-3 rounded-lg border border-slate-800"><span class="text-xs text-slate-300">Ładowanie AC (A)</span><div class="flex gap-2"><input type="number" id="set-ac-charge" class="bg-slate-800 text-[10px] text-white border-slate-700 rounded px-1 w-10 lcd-text"><button onclick="updateWithRetry(['bat_max_utility_charge_current','bat_ac_charging_current'], 'set-ac-charge')" class="bg-blue-600 text-[9px] px-2 py-1 rounded font-bold uppercase">Ustaw</button></div></div>
                        <div class="flex justify-between items-center bg-slate-900/40 p-3 rounded-lg border border-slate-800"><span class="text-xs text-slate-300">Ładowanie PV (A)</span><div class="flex gap-2"><input type="number" id="set-pv-charge" class="bg-slate-800 text-[10px] text-white border-slate-700 rounded px-1 w-10 lcd-text"><button onclick="updateWithRetry(['bat_max_charging_current'], 'set-pv-charge')" class="bg-blue-600 text-[9px] px-2 py-1 rounded font-bold uppercase">Ustaw</button></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let historyPV = []; let historyLoad = []; let historyTime = [];
        let currentVersion = null;

        async function checkVersion() {
            try {
                const r = await fetch('/version');
                const d = await r.json();
                if (currentVersion === null) currentVersion = d.version;
                else if (currentVersion !== d.version) window.location.reload();
            } catch (e) {}
        }
        setInterval(checkVersion, 2000);

        async function fetchData() {
            try {
                const r = await fetch('/data');
                const d = await r.json();
                updateUI(d);
                fetchAutomation();
            } catch (e) { console.error(e); }
        }

        async function fetchAutomation() {
            try {
                const r = await fetch('/automation/state');
                const d = await r.json();
                const weather = d.nodes['weather-1']?.data;
                if (weather && weather.temp !== undefined) {
                    document.getElementById('weather-widget').classList.remove('hidden');
                    document.getElementById('weather-widget').classList.add('flex');
                    document.getElementById('weather-temp').textContent = Math.round(weather.temp) + '°C';
                    document.getElementById('weather-desc').textContent = weather.description;
                    if (weather.raw?.weather?.[0]?.icon) {
                        document.getElementById('weather-icon').src = `https://openweathermap.org/img/wn/${weather.raw.weather[0].icon}@2x.png`;
                    }
                }
            } catch (e) { console.error(e); }
        }

        function updateUI(d) {
            const getVal = (list, s) => {
                if (!list || !Array.isArray(list)) return '0';
                const item = list.find(i => (i.id && i.id.toLowerCase().includes(s.toLowerCase())) || (i.par && i.par.toLowerCase().includes(s.toLowerCase())) || (i.name && i.name.toLowerCase().includes(s.toLowerCase())));
                return item ? item.val : '0';
            };
            const w = (v) => Math.round(parseFloat(v || 0) * 1000);

            const flow = d.webQueryDeviceEnergyFlowEs || {};
            const pars = d.querySPDeviceLastData?.pars || {};

            const pvW = parseInt(getVal(pars.pv_, 'PV Power')) || w(getVal(flow.pv_status, 'pv_output_power'));
            const loadW = parseInt(getVal(pars.bc_, 'Output Active Power')) || w(getVal(flow.bc_status, 'load_active_power'));
            const gridW = w(getVal(flow.gd_status, 'grid_active_power'));
            const batPowerRaw = getVal(flow.bt_status, 'battery_active_power');
            const batW = Math.abs(w(batPowerRaw));
            
            const bStat = (flow.bt_status || []).find(i => i.par === 'battery_active_power');
            let isC = bStat ? bStat.status === 1 : (pvW > loadW + 20);
            let isD = bStat ? bStat.status === -1 : (loadW > pvW + 20 && gridW < 20);
            
            const batCap = parseFloat(getVal(flow.bt_status, 'bt_battery_capacity') || getVal(d.queryDeviceParsEs?.parameter, 'percentage') || 0);
            const loadPct = Math.min(100, Math.round((loadW / 6200) * 100));

            // Numbers only to LCD spans
            document.getElementById('val-pv-w').textContent = pvW.toLocaleString();
            document.getElementById('val-pv-v').textContent = getVal(pars.pv_, 'PV Voltage');
            document.getElementById('val-load-w').textContent = loadW.toLocaleString();
            document.getElementById('val-load-pct').textContent = loadPct;
            document.getElementById('val-grid-w').textContent = gridW.toLocaleString();
            document.getElementById('val-grid-v').textContent = getVal(pars.gd_, 'Grid Voltage');

            const circum = 263.9;
            document.getElementById('circle-bat').style.strokeDashoffset = circum - (batCap / 100 * circum);
            document.getElementById('val-bat-pct').textContent = Math.round(batCap);
            document.getElementById('circle-load').style.strokeDashoffset = circum - (loadPct / 100 * circum);
            document.getElementById('circle-pv').style.strokeDashoffset = circum - (Math.min(100, (pvW / 5000) * 100) / 100 * circum);

            const bCard = document.getElementById('card-battery');
            const bIcon = document.getElementById('bat-icon');
            const bDesc = document.getElementById('bat-state-desc');
            bCard.classList.remove('charge-glow', 'discharge-glow');
            if (isC && batW > 5) { bCard.classList.add('charge-glow'); bIcon.innerHTML = '⚡'; bDesc.textContent = "Ładowanie (+" + batW + "W)"; }
            else if (isD && batW > 5) { bCard.classList.add('discharge-glow'); bIcon.innerHTML = '📤'; bDesc.textContent = "Zasilanie (-" + batW + "W)"; }
            else { bIcon.innerHTML = '🔋'; bDesc.textContent = "IDLE"; }
            document.getElementById('val-bat-w').textContent = batW.toLocaleString();

            const net = pvW - loadW;
            const netEl = document.getElementById('val-net-w');
            const netSub = document.getElementById('sub-net-text');
            const netFill = document.getElementById('net-progress-fill');
            netEl.textContent = Math.abs(net).toLocaleString();
            if (net >= 0) { netEl.style.color = '#4ade80'; netSub.textContent = "Nadwyżka"; netFill.style.width = "75%"; netFill.className = "h-full bg-green-500 transition-all"; }
            else { netEl.style.color = '#f87171'; netSub.textContent = "Pobór"; netFill.style.width = "25%"; netFill.className = "h-full bg-red-500 transition-all"; }

            document.getElementById('v-bat-detail').textContent = getVal(pars.bt_, 'Battery Voltage');
            document.getElementById('v-grid-detail').textContent = getVal(pars.gd_, 'Grid Voltage');
            document.getElementById('v-load-detail').textContent = getVal(pars.bc_, 'Output Voltage');
            
            updateChart(pvW, loadW);
            document.getElementById('header-sync').textContent = new Date().toLocaleTimeString();
        }

        function updateChart(pv, load) {
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            historyPV.push(pv); historyLoad.push(load); historyTime.push(now);
            if (historyPV.length > 30) { historyPV.shift(); historyLoad.shift(); historyTime.shift(); }
            const data = [
                { x: historyTime, y: historyPV, type: 'scatter', mode: 'lines', line: { color: '#F9A826', width: 2, shape: 'spline' }, fill: 'tozeroy', fillcolor: 'rgba(249, 168, 38, 0.1)' },
                { x: historyTime, y: historyLoad, type: 'scatter', mode: 'lines', line: { color: '#3b82f6', width: 2, shape: 'spline' } }
            ];
            const layout = { paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)', margin: { t: 5, r: 5, b: 30, l: 30 }, showlegend: false, xaxis: { showgrid: true, gridcolor: 'rgba(255,255,255,0.05)', tickfont: { color: '#64748b', size: 9 } }, yaxis: { showgrid: true, gridcolor: 'rgba(255,255,255,0.05)', tickfont: { color: '#64748b', size: 9 } } };
            Plotly.react('energy-chart', data, layout, { responsive: true, displayModeBar: false });
        }

        async function fetchSettings(manual = false) {
            const loader = document.getElementById('settings-loading');
            const list = document.getElementById('settings-list');
            try {
                const r = await fetch(manual ? '/settings-refresh' : '/settings');
                const d = await r.json();
                loader.style.display = 'none'; list.style.display = 'block';
                const find = (id) => {
                    const s = d.settings?.find(i => i.id?.includes(id)); if (s) return s.val;
                    const f = d.fallbackData; for (let k in f) { const x = f[k].find(i => i.id?.includes(id) || i.par?.toLowerCase().includes(id.toLowerCase())); if (x) return x.val; }
                    const p = d.devicePars?.find(i => i.par?.includes(id) || i.name?.toLowerCase().includes(id.toLowerCase())); return p ? p.val : null;
                };
                const p = find('priority') || find('read_49');
                if (p) { const s = document.getElementById('set-output-priority'); if (p.includes('Utility')) s.value = "0"; else if (p.includes('Solar')) s.value = "1"; else if (p.includes('SBU')) s.value = "2"; }
                const ac = find('ac_charging_current') || find('read_45');
                if (ac) document.getElementById('set-ac-charge').value = parseInt(ac);
                const pv = find('max_charging_current') || find('read_46');
                if (pv) document.getElementById('set-pv-charge').value = parseInt(pv);
            } catch (e) {}
        }

        async function updateWithRetry(ids, elId) {
            const val = document.getElementById(elId).value;
            const btn = document.activeElement; const orig = btn.textContent;
            btn.disabled = true; btn.textContent = "...";
            for (let id of ids) {
                try {
                    const r = await fetch(`/settings-set?id=${id}&value=${val}`);
                    const res = await r.json();
                    if (res.err === 0 || res.status === 'ok') { btn.className = "bg-green-600 text-white text-[9px] px-2 py-1 rounded font-bold uppercase"; btn.textContent = "OK"; setTimeout(() => { btn.className = "bg-blue-600 text-[9px] px-2 py-1 rounded font-bold uppercase"; btn.textContent = orig; btn.disabled = false; }, 2000); return; }
                } catch (e) {}
            }
            btn.disabled = false; btn.textContent = orig;
        }

        fetchData(); fetchSettings(); setInterval(fetchData, 10000);
    </script>
</body>
</html>
