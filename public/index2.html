        tailwind.config = {

                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],

                    colors: {
                        dashboard: {
                            dark: '#263243',

                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out',
                        'slide-up': 'slideUp 0.5s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },

                        slideUp: {

                        }
                    }
                }
            }
        }
    </script>

            transition: stroke-dashoffset 1.5s ease-in-out;
