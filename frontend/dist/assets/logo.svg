      <use href="#long-ray" transform="rotate(270)" />
      
      <use href="#short-ray" transform="rotate(10)" />
      <use href="#short-ray" transform="rotate(20)" />
      <use href="#short-ray" transform="rotate(30)" />
      <use href="#short-ray" transform="rotate(40)" />
      <use href="#short-ray" transform="rotate(50)" />
      <use href="#short-ray" transform="rotate(60)" />
      <use href="#short-ray" transform="rotate(70)" />
      <use href="#short-ray" transform="rotate(80)" />
      
      <use href="#short-ray" transform="rotate(100)" />
      <use href="#short-ray" transform="rotate(110)" />
      <use href="#short-ray" transform="rotate(120)" />
      <use href="#short-ray" transform="rotate(130)" />
      <use href="#short-ray" transform="rotate(140)" />
      <use href="#short-ray" transform="rotate(150)" />
      <use href="#short-ray" transform="rotate(160)" />
      <use href="#short-ray" transform="rotate(170)" />
      
      <use href="#short-ray" transform="rotate(190)" />
