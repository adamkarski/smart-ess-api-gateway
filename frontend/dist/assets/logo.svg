<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@600&amp;family=Montserrat:wght@700&amp;display=swap');
      
      .bg-rect {
        fill: #161f2c;
      }
      .title-text {
        font-family: 'Fredoka', 'Arial Rounded MT Bold', sans-serif;
        font-weight: 600;
        fill: #FFFFFF;
      }
      .subtitle-text {
        font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
        font-weight: 700;
        fill: #FFFFFF;
        letter-spacing: 0.32em;
      }
    </style>
    
    <path id="long-ray" d="M -2.5 -38 L 2.5 -38 L 0 -88 Z" fill="#26dfa4" />
    <path id="short-ray" d="M -2 -38 L 2 -38 L 0 -64 Z" fill="#26dfa4" />
  </defs>

  <rect class="bg-rect" width="800" height="360" rx="8" />

  <g id="logo-title">
    <text x="145" y="195" class="title-text" font-size="135">S</text>
    
    <g transform="translate(295, 144)">
      <use href="#long-ray" transform="rotate(0)" />
